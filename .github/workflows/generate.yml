name: Generate Go Proto Code

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout generated repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone proto repo
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Moldirkab/ap2_final_car_proto.git proto-source

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clean old generated files
        run: |
          rm -rf paymentpb ordertrackingpb

      - name: Generate Go code
        run: |
          protoc \
            --proto_path=proto-source/proto \
            --go_out=. \
            --go_opt=module=github.com/Moldirkab/ap2-generated \
            --go-grpc_out=. \
            --go-grpc_opt=module=github.com/Moldirkab/ap2-generated \
            proto-source/proto/payment.proto

          protoc \
            --proto_path=proto-source/proto \
            --go_out=. \
            --go_opt=module=github.com/Moldirkab/ap2-generated \
            --go-grpc_out=. \
            --go-grpc_opt=module=github.com/Moldirkab/ap2-generated \
            proto-source/proto/order_tracking.proto

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Generate protobuf Go files"
          git push