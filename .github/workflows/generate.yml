name: Generate Go Proto Code

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout generated repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clone proto repo
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/Moldirkab/ap2_final_car_service_proto.git proto-source

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache: false

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clean old generated files
        run: |
          rm -rf carpb

      # 🔥 FIXED STEP
      - name: Generate Go code
        run: |
          set -e
          mkdir -p carpb

          ls -R proto-source/car

          protoc \
            --proto_path=proto-source/car \
            --go_out=carpb \
            --go_opt=paths=source_relative \
            --go-grpc_out=carpb \
            --go-grpc_opt=paths=source_relative \
            proto-source/car/car.proto

      - name: Create go.mod
        run: |
          cat > go.mod << 'EOF'
          module github.com/Moldirkab/ap2_final_car_service_generated

          go 1.21
          EOF

          go mod tidy

      - name: Commit and push generated files
        run: |
          rm -rf proto-source
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet || git commit -m "Generate car protobuf Go files"

          git push